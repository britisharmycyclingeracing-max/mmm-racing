<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Rider Profile</title>
  <link rel="stylesheet" href="./css/site.css">
  <style>
    #profile-app {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .header-card,
    .section-card {
      background: #111;
      color: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .rider-name {
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .rider-meta {
      color: #ccc;
      margin-bottom: 14px;
    }

    .medal img {
      max-height: 52px;
      display: block;
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .stat {
      background: #1b1b1b;
      border-radius: 10px;
      padding: 12px;
    }

    .stat-label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .ribbons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .ribbon {
      text-align: center;
    }

    .ribbon img {
      max-width: 100%;
      max-height: 70px;
      display: block;
      margin: 0 auto 6px auto;
    }

    .ribbon-label {
      font-size: 12px;
      color: #ccc;
    }

    .section-card table {
      margin-top: 12px;
    }

    .section-card th,
    .section-card td {
      border-bottom: 1px solid #333;
    }

    .section-card th {
      color: #aaa;
    }
    .rank-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 16px;
      margin: 18px 0 6px 0;
    }
    
    .rank-badge {
      width: 88px;
      height: 88px;
      object-fit: contain;
      flex-shrink: 0;
    }
    
    .rank-info {
      flex: 1;
    }
    
    .rank-label {
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    
    .rank-name {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin-bottom: 6px;
    }
    
    .rank-progress-text {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    .rank-progress-bar {
      width: 100%;
      max-width: 320px;
      height: 10px;
      background: #2a2a2a;
      border-radius: 999px;
      overflow: hidden;
    }
    
    .rank-progress-fill {
      height: 100%;
      background: #e10600;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav-inner">
      <a href="./" class="nav-logo" id="navLogo">
        <img id="navLogoImg">
        <div class="nav-title">
          <div class="nav-main">Monday Military Madness</div>
          <div class="nav-sub">Community Zwift Race Series</div>
        </div>
      </a>
      <div class="nav-links">
        <a href="./" id="nav-home">Home</a>
        <a href="./results-index.html" id="nav-results">Campaign & Results</a>
        <a href="./standings.html" id="nav-standings">Standings</a>
        <a href="./riders.html" id="nav-riders">Riders</a>
        <a href="./rules.html" id="nav-rules">Rules</a>
      </div>
    </div>
  </nav>

  <div id="profile-app">
    <div id="profileContent" class="empty">Loading rider profile...</div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/site.js"></script>

  <script>
    const STAGES = [
      "OpeningBattle",
      "BreakawayMayhem",
      "SummerSiege",
      "HeatwaveHammer",
      "Attrition",
      "FinalPush",
      "LastStand"
    ];

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function isTrue(value) {
      return String(value).toUpperCase() === "TRUE";
    }

    function stageNameToDisplay(name) {
      return String(name || "")
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/_/g, " ")
        .trim();
    }

    function getMedalImageUrl(rider, assets) {
      const medal = rider["Campaign Medal"] || "None";
      return assets?.Medals?.[medal] || "";
    }

    function getRibbonImageUrl(stage, rider, assets) {
      const completed = isTrue(rider[stage]);
      const key = completed ? `${stage}_On` : `${stage}_Off`;
      return assets?.Ribbons?.[key] || "";
    }

    function getRankFromRacesCompleted(count) {
      const races = Math.max(0, Math.min(Number(count) || 0, 7));
  
      const ranks = {
        0: { name: "Rider", short: "Unranked", image: "./assets/ranks/Rider.png" },
        1: { name: "Rider", short: "Rank 1", image: "./assets/ranks/Rider.png" },
        2: { name: "Breakaway", short: "Rank 2", image: "./assets/ranks/Breakaway.png" },
        3: { name: "Sergeant", short: "Rank 3", image: "./assets/ranks/Sergeant.png" },
        4: { name: "Road Captain", short: "Rank 4", image: "./assets/ranks/Road-Captain.png" },
        5: { name: "Elite Rider", short: "Rank 5", image: "./assets/ranks/Elite-Riderpng" },
        6: { name: "Specialist", short: "Rank 6", image: "./assets/ranks/Specialist.png" },
        7: { name: "War Machine", short: "Rank 7", image: "./assets/ranks/War-Machine.png" }
      };
  
      return ranks[races] || ranks[0];
    }

    function renderProfile(data) {
      const rider = data.rider;
      const history = data.history || [];
      const assets = data.assets || {};
      const el = document.getElementById("profileContent");

      if (!rider) {
        el.className = "empty";
        el.innerHTML = "Rider not found.";
        return;
      }

      const medalUrl = getMedalImageUrl(rider, assets);
      const racesCompleted = Number(rider["Races Completed"]) || 0;
      const rank = getRankFromRacesCompleted(racesCompleted);
      const rankProgress = Math.max(0, Math.min((racesCompleted / 7) * 100, 100));

      const ribbonsHtml = STAGES.map(stage => {
        const img = getRibbonImageUrl(stage, rider, assets);
        return `
          <div class="ribbon">
            ${img ? `<img src="${img}" alt="${stage}">` : ""}
            <div class="ribbon-label">${stageNameToDisplay(stage)}</div>
          </div>
        `;
      }).join("");

      const historyHtml = history.length
        ? `
          <table>
            <thead>
              <tr>
                <th>Race</th>
                <th>Position</th>
                <th>Time</th>
                <th>Points</th>
                <th>Sprint</th>
                <th>KOM</th>
              </tr>
            </thead>
            <tbody>
              ${history.map(r => `
                <tr>
                  <td>${r["Race Name"] || ""}</td>
                  <td>${r["Position"] || ""}</td>
                  <td>${r["Time"] || ""}</td>
                  <td>${r["Points"] || ""}</td>
                  <td>${r["Sprint Points"] || ""}</td>
                  <td>${r["KOM Points"] || ""}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `
        : `<div class="empty">No race history found.</div>`;

      el.className = "";
      el.innerHTML = `
        <div class="header-card">
          <div class="rider-name">${rider.Name || ""}</div>
          <div class="rider-meta">
            ${rider.Competition || ""}${rider.Cat ? " • " + rider.Cat : ""}
          </div>

          <div class="medal">
            ${medalUrl
              ? `<img src="${medalUrl}" alt="${rider["Campaign Medal"] || "Medal"}">`
              : `<div>${rider["Campaign Medal"] || "None"}</div>`
            }
          </div>
          
          <div class="rank-card">
            ${rank.image ? `<img class="rank-badge" src="${rank.image}" alt="${rank.name} badge">` : ""}
            <div class="rank-info">
              <div class="rank-label">Current Rank</div>
              <div class="rank-name">${rank.name}</div>
              <div class="rank-progress-text">${racesCompleted} / 7 races completed</div>
              <div class="rank-progress-bar">
                <div class="rank-progress-fill" style="width: ${rankProgress}%"></div>
              </div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat">
              <div class="stat-label">Total Points</div>
              <div>${rider["Total Points"] || 0}</div>
            </div>
            <div class="stat">
              <div class="stat-label">GC Rank</div>
              <div>${rider["GC Rank"] || "-"}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Races Completed</div>
              <div>${rider["Races Completed"] || 0}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Best Finish</div>
              <div>${rider["Best Finish"] || "-"}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Sprint Points</div>
              <div>${rider["Sprint Points"] || 0}</div>
            </div>
            <div class="stat">
              <div class="stat-label">KOM Points</div>
              <div>${rider["KOM Points"] || 0}</div>
            </div>
          </div>
        </div>

        <div class="section-card">
          <h2>Campaign Progress</h2>
          <div class="ribbons">
            ${ribbonsHtml}
          </div>
        </div>

        <div class="section-card">
          <h2>Race History</h2>
          ${historyHtml}
        </div>
      `;
    }

    async function loadProfilePage() {
      const zwiftId = getQueryParam("zwiftId");

      if (!zwiftId) {
        document.getElementById("profileContent").innerText = "Missing zwiftId parameter.";
        return;
      }

      try {
        const data = await api("profile", { zwiftId });

        if (!data || data.ok === false) {
          document.getElementById("profileContent").innerText = "Failed to load rider profile.";
          console.error(data);
          return;
        }

        renderProfile(data);
      } catch (err) {
        document.getElementById("profileContent").innerText = "Failed to load rider profile.";
        console.error(err);
      }
    }

    loadProfilePage();
  </script>
</body>
</html>
