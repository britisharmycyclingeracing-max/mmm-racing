<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Riders</title>
  <link rel="stylesheet" href="./css/site.css">
  <style>
    #riders-app {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }

    .name-link {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .name-link:hover {
      text-decoration: underline;
    }

    .medal-cell img {
      max-height: 28px;
      display: block;
    }

    @media (max-width: 900px) {
      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav-inner">
      <a href="./" class="nav-logo" id="navLogo">
        <img id="navLogoImg">
        <div class="nav-title">
          <div class="nav-main">Monday Military Madness</div>
          <div class="nav-sub">Community Zwift Race Series</div>
        </div>
      </a>
      <div class="nav-links">
        <a href="./" id="nav-home">Home</a>
        <a href="./results-index.html" id="nav-results">Results</a>
        <a href="./standings.html" id="nav-standings">Standings</a>
        <a href="./riders.html" id="nav-riders">Riders</a>
        <a href="./rules.html" id="nav-rules">Rules</a>
      </div>
    </div>
  </nav>

  <div id="riders-app">
    <div class="page-title">Riders</div>

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Search rider name">
      <select id="competitionFilter">
        <option value="">All Competitions</option>
        <option value="Open">Open</option>
        <option value="Female">Female</option>
      </select>
      <select id="catFilter">
        <option value="">All Categories</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
      </select>
    </div>

    <div id="ridersTableArea"></div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/site.js"></script>

  <script>
    let allRiders = [];
    let assets = {};
    let filtersInitialised = false;

    function getMedalImageUrl(rider) {
      const medal = rider["Campaign Medal"] || "None";
      return assets?.Medals?.[medal] || "";
    }

    function getCompetitionClass(value) {
      return String(value) === "Female" ? "comp-female" : "comp-open";
    }

    function getCatClass(value) {
      return `cat-${String(value || "").trim()}`;
    }

    function renderRiders(rows) {
      const area = document.getElementById("ridersTableArea");

      if (!rows.length) {
        area.innerHTML = `<div class="empty">No riders found.</div>`;
        return;
      }

      area.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Competition</th>
                <th>Cat</th>
                <th>Medal</th>
                <th class="num">Total Points</th>
                <th class="num">GC Rank</th>
                <th class="num">Races Completed</th>
                <th class="num">Best Finish</th>
                <th class="num">Sprint</th>
                <th class="num">KOM</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(rider => {
                const medalUrl = getMedalImageUrl(rider);

                return `
                  <tr>
                    <td>
                      <a class="name-link" href="./profile.html?zwiftId=${encodeURIComponent(rider.ZwiftID)}">
                        ${rider.Name || ""}
                      </a>
                    </td>
                    <td>
                      <span class="comp-pill ${getCompetitionClass(rider.Competition)}">
                        ${rider.Competition || ""}
                      </span>
                    </td>
                    <td>
                      <span class="cat-pill ${getCatClass(rider.Cat)}">
                        ${rider.Cat || ""}
                      </span>
                    </td>
                    <td class="medal-cell">
                      ${
                        medalUrl
                          ? `<img src="${medalUrl}" alt="${rider["Campaign Medal"] || "Medal"}">`
                          : (rider["Campaign Medal"] || "None")
                      }
                    </td>
                    <td class="num">${rider["Total Points"] || 0}</td>
                    <td class="num">${rider["GC Rank"] || "-"}</td>
                    <td class="num">${rider["Races Completed"] || 0}</td>
                    <td class="num">${rider["Best Finish"] || "-"}</td>
                    <td class="num">${rider["Sprint Points"] || 0}</td>
                    <td class="num">${rider["KOM Points"] || 0}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function applyFilters() {
      const q = document.getElementById("searchBox").value.trim().toLowerCase();
      const competition = document.getElementById("competitionFilter").value;
      const cat = document.getElementById("catFilter").value;

      const filtered = allRiders.filter(rider => {
        const matchesName = !q || String(rider.Name || "").toLowerCase().includes(q);
        const matchesCompetition = !competition || String(rider.Competition || "") === competition;
        const matchesCat = !cat || String(rider.Cat || "") === cat;
        return matchesName && matchesCompetition && matchesCat;
      });

      renderRiders(filtered);
    }

    function initFilters() {
      if (filtersInitialised) return;
      filtersInitialised = true;

      document.getElementById("searchBox").addEventListener("input", applyFilters);
      document.getElementById("competitionFilter").addEventListener("change", applyFilters);
      document.getElementById("catFilter").addEventListener("change", applyFilters);
    }

    async function loadRidersPage() {
      try {
        const data = await api("riders");

        if (!data || data.ok === false) {
          document.getElementById("ridersTableArea").innerHTML =
            `<div class="empty">Failed to load riders.</div>`;
          console.error(data);
          return;
        }

        allRiders = data.riders || [];
        assets = data.assets || {};
        initFilters();
        renderRiders(allRiders);
      } catch (err) {
        document.getElementById("ridersTableArea").innerHTML =
          `<div class="empty">Failed to load riders.</div>`;
        console.error(err);
      }
    }

    loadRidersPage();
  </script>
</body>
</html>
