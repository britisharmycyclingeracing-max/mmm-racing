<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMM Standings</title>
  <link rel="stylesheet" href="./css/site.css">
  <style>
    #standings-app {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }

    .tab-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab-btn {
      background: #222;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #e10600;
    }

    .table-wrap {
      padding: 0;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav-inner">
      <a href="./" class="nav-logo">MMM</a>
      <div class="nav-links">
        <a href="./" id="nav-home">Home</a>
        <a href="./results-index.html" id="nav-results">Results</a>
        <a href="./standings.html" id="nav-standings">Standings</a>
        <a href="./riders.html" id="nav-riders">Riders</a>
        <a href="./rules.html" id="nav-rules">Rules</a>
      </div>
    </div>
  </nav>

  <div id="standings-app">
    <div class="page-title">Standings</div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="overall">Overall</button>
      <button class="tab-btn" data-tab="gc">GC</button>
      <button class="tab-btn" data-tab="sprint">Sprint</button>
      <button class="tab-btn" data-tab="kom">KOM</button>
    </div>

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Search rider name">
      <select id="competitionFilter">
        <option value="">All Competitions</option>
        <option value="Open">Open</option>
        <option value="Female">Female</option>
      </select>
      <select id="catFilter">
        <option value="">All Categories</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
      </select>
    </div>

    <div id="tableArea" class="table-wrap"></div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/site.js"></script>

  <script>
    let standingsData = {
      overall: [],
      gc: [],
      sprint: [],
      kom: []
    };

    let currentTab = "overall";
    let tabsInitialised = false;
    let filtersInitialised = false;

    function getCompetitionClass(value) {
      return String(value) === "Female" ? "comp-female" : "comp-open";
    }

    function getCatClass(value) {
      return `cat-${String(value || "").trim()}`;
    }

    function getCurrentRows() {
      return standingsData[currentTab] || [];
    }

    function getColumnsForTab(tab, rows) {
      const base = ["Rank", "Name", "Competition", "Cat"];

      if (!rows.length) return base;

      const allCols = Object.keys(rows[0]);
      const raceCols = allCols
        .filter(c => /^Race \d+$/i.test(c))
        .sort((a, b) => Number(a.replace("Race ", "")) - Number(b.replace("Race ", "")));

      if (tab === "gc") {
        return [...base, ...raceCols, "Time", "Time Gap"];
      }

      if (tab === "overall") {
        return [...base, ...raceCols, "Total Points"];
      }

      return [...base, ...raceCols, "Total Points"];
    }

    function renderTable(rows) {
      const area = document.getElementById("tableArea");

      if (!rows.length) {
        area.innerHTML = `<div class="empty">No standings found.</div>`;
        return;
      }

      const columns = getColumnsForTab(currentTab, rows);

      area.innerHTML = `
        <table>
          <thead>
            <tr>
              ${columns.map(col => `
                <th class="${
                  col === 'Rank' ||
                  col === 'Time' ||
                  col === 'Time Gap' ||
                  col === 'Total Points' ||
                  /^Race \\d+$/i.test(col)
                    ? 'num'
                    : ''
                }">${col}</th>
              `).join("")}
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                ${columns.map(col => {
                  if (col === "Competition") {
                    return `
                      <td>
                        <span class="comp-pill ${getCompetitionClass(r[col])}">
                          ${r[col] || ""}
                        </span>
                      </td>
                    `;
                  }

                  if (col === "Cat") {
                    return `
                      <td>
                        <span class="cat-pill ${getCatClass(r[col])}">
                          ${r[col] || ""}
                        </span>
                      </td>
                    `;
                  }

                  const numericLike =
                    col === "Rank" ||
                    col === "Time" ||
                    col === "Time Gap" ||
                    col === "Total Points" ||
                    /^Race \d+$/i.test(col);

                  return `<td class="${numericLike ? 'num' : ''}">${r[col] || ""}</td>`;
                }).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function applyFilters() {
      const q = document.getElementById("searchBox").value.trim().toLowerCase();
      const competition = document.getElementById("competitionFilter").value;
      const cat = document.getElementById("catFilter").value;

      const filtered = getCurrentRows().filter(row => {
        const matchesName = !q || String(row.Name || "").toLowerCase().includes(q);
        const matchesCompetition = !competition || String(row.Competition || "") === competition;
        const matchesCat = !cat || String(row.Cat || "") === cat;
        return matchesName && matchesCompetition && matchesCat;
      });

      renderTable(filtered);
    }

    function initTabs() {
      if (tabsInitialised) return;
      tabsInitialised = true;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentTab = btn.dataset.tab;
          applyFilters();
        });
      });
    }

    function initFilters() {
      if (filtersInitialised) return;
      filtersInitialised = true;

      document.getElementById("searchBox").addEventListener("input", applyFilters);
      document.getElementById("competitionFilter").addEventListener("change", applyFilters);
      document.getElementById("catFilter").addEventListener("change", applyFilters);
    }

    async function loadStandingsPage() {
      try {
        const data = await api("standings");

        if (!data || data.ok === false) {
          document.getElementById("tableArea").innerHTML =
            `<div class="empty">Failed to load standings.</div>`;
          console.error(data);
          return;
        }

        standingsData = {
          overall: data.overall || [],
          gc: data.gc || [],
          sprint: data.sprint || [],
          kom: data.kom || []
        };

        initTabs();
        initFilters();
        renderTable(getCurrentRows());
      } catch (err) {
        document.getElementById("tableArea").innerHTML =
          `<div class="empty">Failed to load standings.</div>`;
        console.error(err);
      }
    }

    loadStandingsPage();
  </script>
</body>
</html>
